services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/keytrialpro.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/php-api:/srv/keytrialpro/apps/php-api:ro
    depends_on:
      - php

  php:
    image: php:8.4-fpm
    working_dir: /srv/keytrialpro/apps/php-api
    volumes:
      - ../apps/php-api:/srv/keytrialpro/apps/php-api
      - ./php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keytrialpro
      MYSQL_USER: keytrialpro
      MYSQL_PASSWORD: change_me
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"

  redis:
    image: redis:8-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"

volumes:
  mysql_data:

